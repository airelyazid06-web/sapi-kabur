<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sapi Qurban Kabur Simulator</title>
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; }
        body { 
            background: #2f3542; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            flex-direction: column; 
            overflow: hidden; 
            font-family: 'Courier New', Courier, monospace;
            /* Mencegah teks ter-highlight secara tidak sengaja saat tombol di-tap cepat di HP */
            user-select: none;
            -webkit-user-select: none;
        }

        /* Pembungkus Utama Konten Menu */
        #menu-container {
            position: relative;
            z-index: 100;
        }

        /* Tampilan Kotak Utama (Login / Leaderboard) */
        .card-screen {
            background: #1e222b;
            padding: 30px;
            border: 3px solid #fff;
            border-radius: 8px;
            text-align: center;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 350px;
            max-width: 90vw;
        }
        h2 {
            margin-bottom: 20px;
            color: #ffa502;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        input {
            padding: 10px;
            width: 90%;
            font-size: 16px;
            border: 2px solid #747d8c;
            background: #2f3542;
            color: white;
            text-align: center;
            margin-bottom: 15px;
            outline: none;
        }
        input:focus {
            border-color: #ffa502;
        }
        button {
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            color: #1e222b;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            margin: 5px;
            position: relative;
            z-index: 110;
        }
        .btn-primary { background: #ffa502; }
        .btn-primary:hover { background: #ff7f50; }
        .btn-secondary { background: #a4b0be; }
        .btn-secondary:hover { background: #747d8c; }

        #login-highscore {
            margin-top: 15px;
            font-size: 14px;
            color: #a4b0be;
            border-top: 1px dashed #747d8c;
            padding-top: 10px;
        }

        /* Tampilan Halaman Peringkat (Leaderboard) */
        #leaderboard-screen {
            display: none;
        }
        #leaderboard-list {
            text-align: left;
            margin: 15px 0;
            background: #2f3542;
            padding: 10px;
            border-radius: 4px;
            max-height: 150px;
            overflow-y: auto;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #1e222b;
            font-size: 14px;
        }
        .leaderboard-item:last-child { border: none; }

        /* Area Game */
        #game-wrapper {
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            width: 100%;
        }

        #game-container {
            width: 600px;
            max-width: 95vw;
            height: 220px;
            position: relative;
            overflow: hidden;
            background-image: url('pedesaan.png'); 
            background-size: cover;
            background-position: bottom; 
            border: 3px solid #fff;
        }

        /* Hitbox Sapi */
        #dino {
            width: 50px; height: 55px;
            position: absolute; bottom: 30px; left: 70px;
            z-index: 15;
            transition: height 0.1s; 
        }
        #dino-img {
            width: 130px; height: 130px;
            position: absolute; bottom: -15px; left: -40px;
            object-fit: contain; transform: scaleX(-1);
            transition: transform 0.1s, height 0.1s;
        }

        /* Ketika Sapi Merunduk */
        .duck { height: 25px !important; }
        .duck #dino-img {
            transform: scaleX(-1) scaleY(0.6); 
            bottom: -35px;
        }

        /* Rintangan Bawah (Batu) */
        #cactus {
            width: 45px; height: 45px;
            position: absolute; bottom: 30px; left: 580px;
            z-index: 12;
            background-image: url('batu.png?v=1'); 
            background-size: contain;
            background-repeat: no-repeat;
        }

        /* Rintangan Atas (Burung) */
        #bird {
            width: 45px; height: 45px;
            position: absolute; bottom: 50px; left: 580px; 
            z-index: 12;
            background-image: url('burung.png'); 
            background-size: contain;
            background-repeat: no-repeat;
        }

        .jump { animation: jump 0.55s ease-in-out; }
        @keyframes jump {
            0% { bottom: 30px; }
            45% { bottom: 155px; }
            55% { bottom: 155px; }
            100% { bottom: 30px; }
        }

        h1 { color: white; margin-bottom: 10px; text-transform: uppercase; font-size: 20px; text-align: center; }
        #score-board { margin-top: 15px; font-size: 24px; font-weight: bold; color: #fff; text-align: center; }
        #highscore-board { font-size: 16px; color: #ffa502; margin-top: 5px; }
        #game-over-text { display: none; color: #ff4757; font-weight: bold; font-size: 20px; margin-top: 15px; text-align: center; }
        #tutorial { color: #ced6e0; font-size: 14px; margin-top: 5px; text-align: center; }

        /* Desain Tombol Kontrol khusus Layar HP */
        #mobile-controls {
            display: none;
            justify-content: space-between;
            width: 95vw;
            max-width: 600px;
            margin-top: 20px;
        }
        .mobile-btn {
            width: 47%;
            height: 60px;
            background: #ffa502;
            color: #1e222b;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            border: 2px solid #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 0px #ff7f50;
            cursor: pointer;
            /* Mencegah zoom saat di-tap ganda di beberapa browser mobile */
            touch-action: manipulation; 
        }
        .mobile-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Deteksi jika dibuka di layar HP (lebar di bawah 768px) */
        @media (max-width: 768px) {
            #mobile-controls { display: flex; }
            #tutorial { display: none; } /* Sembunyikan panduan keyboard jika di HP */
        }
    </style>
</head>
<body>

    <div id="menu-container">
        <div id="login-screen" class="card-screen">
            <h2>Kendali Sapi</h2>
            <input type="text" id="username-input" placeholder="Nama Peternak..." maxlength="15" autocomplete="off">
            <br>
            <button class="btn-primary" onclick="startGame()">Mulai Kabur</button>
            <button class="btn-secondary" onclick="showLeaderboard()">Peringkat</button>
            <div id="login-highscore">Top Score Kamu: <span id="login-highscore-val">0</span></div>
        </div>

        <div id="leaderboard-screen" class="card-screen">
            <h2>Top Skor Global</h2>
            <div id="leaderboard-list"></div>
            <button class="btn-secondary" onclick="hideLeaderboard()">Kembali</button>
        </div>
    </div>

    <div id="game-wrapper">
        <h1>sapi qurban kabur simulator</h1>
        <div id="game-container">
            <div id="dino">
                <img id="dino-img" src="sapi.png" alt="Sapi">
            </div>
            <div id="cactus"></div>
            <div id="bird"></div>
        </div>

        <div id="mobile-controls">
            <div id="btn-duck" class="mobile-btn">MERUNDUK</div>
            <div id="btn-jump" class="mobile-btn">LOMPAT</div>
        </div>

        <div id="score-board">Skor: 0</div>
        <div id="tutorial">Tekan [Panah Atas / Space] untuk Lompat, [Panah Bawah] untuk Merunduk</div>
        <div id="game-over-text">YAAH KETANGKEP!<br><span style="font-size:14px; color:#fff;">Tap layar / Pencet apapun untuk main lagi</span></div>
    </div>

    <script>
        // --- LOGIKA MENURUTI STRUKTUR CODINGANMU ---
        const dino = document.getElementById("dino");
        const btnJump = document.getElementById("btn-jump");
        const btnDuck = document.getElementById("btn-duck");

        // Fungsi Lompat
        function jump() {
            if (!dino.classList.contains("jump") && !dino.classList.contains("duck")) {
                dino.classList.add("jump");
                setTimeout(() => {
                    dino.classList.remove("jump");
                }, 550); // Menyesuaikan durasi animasi CSS (0.55s)
            }
        }

        // Fungsi Merunduk Mulai
        function startDuck() {
            if (!dino.classList.contains("jump")) {
                dino.classList.add("duck");
            }
        }

        // Fungsi Merunduk Selesai
        function stopDuck() {
            dino.classList.remove("duck");
        }

        // --- EVENT LISTENER UNTUK MOBILE (SENTUHAN) ---
        
        // Tombol Lompat di-tap
        btnJump.addEventListener("touchstart", (e) => {
            e.preventDefault(); // Mencegah bug ghost click di mobile
            jump();
        });

        // Tombol Merunduk ditekan
        btnDuck.addEventListener("touchstart", (e) => {
            e.preventDefault();
            startDuck();
        });

        // Tombol Merunduk dilepas
        btnDuck.addEventListener("touchend", (e) => {
            e.preventDefault();
            stopDuck();
        });


        // --- PENDUKUNG MENU (Fungsi Dummy agar tidak error saat dicoba) ---
        function startGame() {
            document.getElementById("menu-container").style.display = "none";
            document.getElementById("game-wrapper").style.display = "flex";
        }
        function showLeaderboard() {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("leaderboard-screen").style.display = "block";
        }
        function hideLeaderboard() {
            document.getElementById("leaderboard-screen").style.display = "none";
            document.getElementById("login-screen").style.display = "block";
        }
    </script>
</body>
</html>
